# Pages CMS configuration — edit this site through app.pagescms.org
# https://pagescms.org/docs/configuration/
#
# After pushing this file, go to https://app.pagescms.org, install the
# Pages CMS GitHub App on kafkapple/kafkapple.github.io, and select the
# repository. Login with GitHub; posts can be created/edited/deleted via
# the web UI (commits go back to this repo automatically).

media: assets/img

content:
  # -----------------------------------------------------------------------------
  # Blog (personal insights) — edit freely via CMS
  # -----------------------------------------------------------------------------
  - name: blog
    label: Blog posts (personal insights)
    type: collection
    path: blog/_posts
    filename: "{year}-{month}-{day}-{fields.slug}.md"
    view:
      fields: [title, date, tags]
      sort: [{field: date, direction: desc}]
    fields:
      - name: layout
        label: Layout
        type: string
        default: post
        hidden: true
      - name: title
        label: Title
        type: string
        required: true
      - name: slug
        label: URL slug
        type: string
        required: true
        description: "English-only, lowercase, dashes. e.g. my-first-post"
        pattern: "^[a-z0-9-]+$"
      - name: date
        label: Date
        type: date
        required: true
      - name: description
        label: Description (SEO, 1-line)
        type: string
      - name: categories
        label: Categories
        type: string
        list: true
        default: [blog]
      - name: tags
        label: Tags
        type: string
        list: true
      - name: image
        label: Cover image
        type: image
      - name: comments
        label: Enable comments
        type: boolean
        default: true
      - name: body
        label: Body (Markdown)
        type: rich-text
        required: true

  # -----------------------------------------------------------------------------
  # Culture & Arts — single page, editable content
  # -----------------------------------------------------------------------------
  - name: culture
    label: Culture & Arts page
    type: file
    path: culture.md
    fields:
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: string
      - name: body
        label: Body (Markdown)
        type: rich-text

  # -----------------------------------------------------------------------------
  # Home (index) — edit About bio, News, Publications directly
  # -----------------------------------------------------------------------------
  - name: home
    label: Home page (/)
    type: file
    path: index.md
    fields:
      - name: title
        label: Page title
        type: string
      - name: description
        label: Meta description
        type: string
      - name: body
        label: Body (About + News + Research Interests + Publications + Experience + Teaching + Awards)
        type: rich-text

# -----------------------------------------------------------------------------
# NOTE: til/_posts/ is intentionally NOT exposed as a collection here.
# Those posts are auto-generated by scripts/sync_til.py from ~/dev/TIL repo.
# Editing them via CMS would cause conflicts with the next sync run.
# TIL source of truth = Obsidian vault → kafkapple/TIL repo → this site.
# -----------------------------------------------------------------------------
